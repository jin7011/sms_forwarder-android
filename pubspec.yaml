name: sms_forwarder
description: "SMS to Slack Forwarder - 내부용"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Navigation
  go_router: ^14.8.0

  # Local Storage
  shared_preferences: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # SMS Reception
  another_telephony: ^0.4.1

  # Device Info
  device_info_plus: ^11.0.0

  # Utilities
  logger: ^2.5.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.19.0
  permission_handler: ^11.3.1
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.2
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

  # =============================================================================
  # App Icon & Splash Screen (앱 아이콘 & 스플래시 스크린)
  # =============================================================================
  flutter_launcher_icons: ^0.14.1            # 앱 아이콘 자동 생성
  flutter_native_splash: ^2.4.2              # 네이티브 스플래시 스크린 자동 생성

flutter:
  uses-material-design: true
  assets:
    - assets/config/
    - assets/images/

# =============================================================================
# Flutter Launcher Icons 설정
# 실행 명령어: flutter pub run flutter_launcher_icons
# =============================================================================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 24
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon.png"

# =============================================================================
# Flutter Native Splash 설정
# 실행 명령어: flutter pub run flutter_native_splash:create
# =============================================================================
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/icon.png"
  android: true
  ios: true
  web: false
